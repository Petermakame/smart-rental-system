services:
  - type: web
    name: smart-rental-system
    env: node
    buildCommand: npm install && node scripts/migrate.js && node scripts/seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smart-rental-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: smart-rental-db
    databaseName: smart_rental
    user: smart_rental_user
    plan: free
